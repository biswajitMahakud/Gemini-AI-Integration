<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
          background-color: #121212; /* Dark background */
          color: #fff;
          height: 100vh;
          display: flex;
          flex-direction: column;
          font-family: Arial, sans-serif;
        }

        .navbar {
            border-bottom: 1px solid #2a2a2a;
        }

        .chat-container {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 1rem;
        }

        .chat-header {
          font-size: 1.5rem;
          font-weight: 500;
          margin-bottom: 1.5rem;
          text-align: center;
          color: #eaeaea;
        }

        #chat-box {
          flex: 1;
          width: 100%;
          max-width: 800px;
          overflow-y: auto;
          padding: 1rem;
          margin-bottom: 1.5rem;
        }

        .message {
          margin-bottom: 1rem;
          padding: 12px 16px;
          border-radius: 10px;
          max-width: 95%;
        }

        .user-message {
          background-color: #0d6efd;
          color: white;
          margin-left: auto;
        }

        .bot-message {
          background-color: #2a2a2a;
          color: #eaeaea;
          margin-right: auto;
        }

        .chat-input-container {
          width: 100%;
          max-width: 900px;
          margin: 0 auto;
          padding: 0.5rem;
        }

        #chat-input {
          background: #1e1e1e;
          border: 1px solid #333;
          color: #eaeaea;
          opacity:1;
          border-radius: 25px;
          padding: 12px 20px;
        }

        #chat-input:focus {
          outline: none;
          border-color: #0d6efd;
          box-shadow: 0 0 5px #0d6efd;
        }

        #chat-input::placeholder {
          color: #eaeaea !important;
          opacity: 1;
        }

        .btn-send {
          border-radius: 50%;
          padding: 0.6rem 0.8rem;
          margin-left: 0.5rem;
        }
    </style>
</head>
<body>


<!-- Navbar with Logo + Name -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="gemini_logo.png" alt="Logo" width="72" height="72" class="me-2 rounded-circle border border-dark">
        <span>Gemini Chat</span>
    </a>
</nav>
<div class="chat-container">
    <div class="chat-header">What can I help with?</div>

    <div id="chat-box"></div>

    <form id="chat-form" class="d-flex chat-input-container">
        <input type="text" id="chat-input" class="form-control" placeholder="Ask anything..." required>
        <button class="btn btn-primary btn-send" type="submit">➤</button>
    </form>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");

    function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender === "user" ? "user-message" : "bot-message");

    if (sender === "bot") {
        msg.innerHTML = marked.parse(text); // Convert Markdown to HTML
    } else {
        msg.textContent = text;
    }

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}


    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const userMsg = chatInput.value;
      addMessage(userMsg, "user");
      chatInput.value = "";

      addMessage("Typing...", "bot");

      try {
        const response = await fetch("http://13.202.88.206:8798/gemini/generate/text", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: userMsg })
        });

        if (!response.ok) {
            throw new Error("Network response was not ok");
        }
        const data = await response.text();
        chatBox.lastChild.remove();
        addMessage(data, "bot");
      } catch (error) {
        chatBox.lastChild.remove();
        addMessage("⚠️ Error fetching response", "bot");
      }
    });

</script>

</body>
</html>
